<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Library</h1>
    <p id="myLibrary"></p>
    <button id="newBook">New Book</button>
    <dialog id="newBookForm">
      <form action="" id="form">
        <label for="bookTitle">Book Title:</label>
        <input type="text" name="bookTitle" id="bookTitle" required />

        <label for="bookAuthor">Author:</label>
        <input type="text" name="bookAuthor" id="bookAuthor" required />

        <label for="bookPages">Page Count:</label>
        <input type="text" name="bookPages" id="bookPages" required />
        <button id="submitBtn" type="submit">Submit</button>
      </form>
      <button type="button" id="closeBtn">X</button>
    </dialog>
    <script src="./scripts.js"></script>
  </body>
</html>
